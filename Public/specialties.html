<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Especialidades Médicas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">

    <div class="logo">
        🏥 GeoHealth
    </div>

    <div class="user-info">
        Bienvenido,
        <span id="user-name">Usuario</span>
    </div>

    <ul class="nav-links">
        <li><a href="index.html">Mapa</a></li>
        <li><a href="specialties.html">Especialidades</a></li>
        <li><a href="medicalStaff.html">Médicos</a></li>
        <li><a href="#" id="logout-btn">Cerrar Sesión</a></li>
    </ul>

</nav>

<section class="hero">

    <h1>Especialidades Médicas</h1>

    <p>
        Gestión de especialidades registradas en el sistema.
    </p>

</section>

<section class="panel">

    <div class="dashboard-content">

        <div class="form-card">

            <h2>Registrar Especialidad</h2>

            <form id="specialty-form" class="place-form">

                <input
                    type="text"
                    id="name"
                    placeholder="Nombre especialidad"
                    required
                >

                <input
                    type="text"
                    id="description"
                    placeholder="Descripción"
                    required
                >

                <input
                    type="hidden"
                    id="editing-id"
                >

                <button type="submit">
                    Guardar Especialidad
                </button>

            </form>

        </div>

        <div class="table-card">

            <h2>Especialidades Registradas</h2>

            <table>

                <thead>

                    <tr>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Acciones</th>
                    </tr>

                </thead>

                <tbody id="specialties-table">

                </tbody>

            </table>

        </div>

    </div>

</section>

<script src="specialties.js"></script>

</body>
</html>
