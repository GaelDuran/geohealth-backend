<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Personal Médico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">

    <div class="logo">
        🏥 GeoHealth
    </div>

    <div class="user-info">
        Bienvenido,
        <span id="user-name">Usuario</span>
    </div>

    <ul class="nav-links">
        <li><a href="index.html">Mapa</a></li>
        <li><a href="specialties.html">Especialidades</a></li>
        <li><a href="medicalStaff.html">Médicos</a></li>
        <li><a href="#" id="logout-btn">Cerrar Sesión</a></li>
    </ul>

</nav>

<section class="hero">

    <h1>Personal Médico</h1>

    <p>
        Administración del personal médico y sus especialidades.
    </p>

</section>

<section class="panel">

    <div class="dashboard-content">

        <div class="form-card">

            <h2>Registrar Médico</h2>

            <form id="doctor-form" class="place-form">

                <input
                    type="text"
                    id="name"
                    placeholder="Nombre del médico"
                    required
                >

                <input
                    type="text"
                    id="phone"
                    placeholder="Teléfono"
                    required
                >

                <select
                    id="specialty"
                    required
                >
                    <option value="">
                        Seleccionar especialidad
                    </option>
                </select>

                <button type="submit">
                    Guardar Médico
                </button>

            </form>

        </div>

        <div class="table-card">

            <h2>Médicos Registrados</h2>

            <table>

                <thead>

                    <tr>
                        <th>Nombre</th>
                        <th>Teléfono</th>
                        <th>Especialidad</th>
                        <th>Acciones</th>
                    </tr>

                </thead>

                <tbody id="doctors-table">

                </tbody>

            </table>

        </div>

    </div>

</section>

<script src="medicalStaff.js"></script>

</body>
</html>
