<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="container">

        <div class="box">
            <div class="logo">🏥</div>
            <h2>GeoHealth</h2>
            <p class="subtitle">Iniciar Sesión</p>
            <input type="email" id="login-email" placeholder="Correo">
            <input type="password" id="login-password" placeholder="Contraseña">
            <button id="login-btn">Entrar</button>
        </div>
        <div class="box">
            <div class="logo">🩺</div>
            <h2>Crear Cuenta</h2>
            <p class="subtitle">Registro de Usuario</p>
            <input type="text" id="register-name" placeholder="Nombre">
            <input type="email" id="register-email" placeholder="Correo">
            <input type="password" id="register-password" placeholder="Contraseña">
            <button id="register-btn">
                Registrarse
            </button>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
